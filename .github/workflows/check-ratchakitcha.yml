name: Check Ratchakitcha Daily

on:
  schedule:
    - cron: '0 6 * * *'
  
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run check script
        env:
          RATCHAKITCHA_TOKEN: ${{ secrets.RATCHAKITCHA_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: node check.js
