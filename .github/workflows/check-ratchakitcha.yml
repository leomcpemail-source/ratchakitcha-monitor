name: Check Ratchakitcha Daily

on:
  schedule:
    - cron: '42 6 * * *'
  
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run check script
        run: node check.js
